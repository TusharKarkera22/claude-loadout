name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: typecheck + test + build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: dist/ is in sync with src/
        run: |
          if ! git diff --quiet --exit-code dist/; then
            echo "::error::dist/ is stale. Run 'npm run build' and commit the result."
            git --no-pager diff --stat dist/
            exit 1
          fi
